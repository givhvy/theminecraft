<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TheMinecraft - Voxel World</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<canvas id="game"></canvas>
<div id="crosshair">+</div>
<div id="hearts"></div>
<div id="hotbar"></div>
<div id="info"></div>
<div id="buildinfo"></div>
<div id="breakbar"><div></div></div>
<div id="vignette"></div>
<div id="watertint"></div>
<div id="savestate">✔ World saved</div>
<div id="langtoggle"><span data-lang="en">EN</span><span data-lang="vi">VI</span></div>
<div id="inventory"><h2 id="invtitle"></h2><div id="invgrid"></div></div>
<div id="builder"><h2 id="buildtitle"></h2><div id="buildgrid"></div></div>
<div id="deathscreen"><h1 id="deathtitle"></h1><button id="respawnbtn"></button></div>
<div id="overlay">
  <h1>TheMinecraft</h1>
  <p id="ctrl1"></p>
  <p id="ctrl2"></p>
  <p id="ctrl3"></p>
  <p id="ctrl4"></p>
  <div id="joinbox">
    <input id="nameinput" maxlength="16" autocomplete="off">
    <div class="start" id="playbtn">Click to play</div>
    <div id="joinstatus"></div>
    <div id="accountbox">
      <div id="accounthead"></div>
      <div id="accountforms">
        <input id="accuser" maxlength="16" autocomplete="username">
        <input id="accpass" type="password" autocomplete="current-password">
        <div class="accbtns">
          <button id="loginbtn"></button>
          <button id="registerbtn"></button>
        </div>
        <div id="accstatus"></div>
      </div>
      <div id="accloggedin" style="display:none">
        <span id="accwho"></span> <button id="logoutbtn"></button>
      </div>
      <div id="guesthint"></div>
    </div>
  </div>
</div>
<script type="module" src="./src/main.ts"></script>
</body>
</html>
